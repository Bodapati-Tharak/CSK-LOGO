<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK</title>
    <style>
        .CSK-Flag {
            background-color: yellow;
            height: 400px;
            position: relative;
        }
        .CSK-Flag img{
            position:absolute;
            top: 20%;
            left: 40%;
            width: 30%;
        }
        .CSK-Flag > div h1{
            position: absolute;
            left: 50%;
            
        }
    </style>
</head>
<body>
    <div class="CSK-Flag">
          <img src="./CSK.png">
          <div>
                <h1>
                    CSK                    
                </h1>
          </div>
    </div>
</body>
</html>
